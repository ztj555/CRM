 <script type="text/javascript">
   //转移---begin
   var allKefuInfo = null,allKefuData={};
   if(allKefuInfo){
       for(var i in allKefuInfo){
           allKefuData[allKefuInfo[i]['id']] = allKefuInfo[i]['name'];
       }
   }
   function transferKefu(){
       var target_kid = ~~$('#target_kid').val(),checkList  = $('input[name=checkone]:checked'),lid = [];
       if(!target_kid){
           return alert('请选择转移的顾问');
       }
       if(!checkList.length){
           return alert('请选择需转移的客户信息');
       }
       for(var i=0;i<checkList.length;i++){
           lid.push($(checkList[i]).val());
       }
       if(confirm("确定转移"+checkList.length+"条记录给<<"+allKefuData[target_kid]+">>顾问吗？")){
           $.ajax({
               url:'/manage/kefu_clients/transfer',
               type:'POST',
               data:{'target_kid':target_kid,'lid':lid.join(',')},
               cache:false,
               dataType:'json',
               success:function(d){
                   if(d['code']<0){
                   	alert(d['msg']);
                   }else{
                   	alert('操作成功!');
                   	location.reload();
                   }
               },
               error:function(){
                   alert('请求异常，请刷新再试!');
               }
           });
       }
   }
   //转移---end
   function pageSizeChange(tag){
        var url = new URL("?", window.location.href);
        url.searchParams.set($(tag).attr("name"), $(tag).val()); 
        window.location.href = url.toString()
   }
   
   //每页展示多少条专用JS
   var count = 1; 
	$(function(){
		$('#num').change(function(){
			var num = $('#num').val();
			window.location.href="/manage/kefu_clients/index.html?ordertime=&lastupdatetime=&num="+num;
		});		
		/* 处理搜狗谷歌浏览器兼容 */
		// $("input[type='checkbox']").attr("checked",false); 
		$('#chboxarr').val('');
	
		$("#loan_money_rang").change(function(){
			if($("#loan_money_rang").val() == "customize"){
				$("#loan_money").show();
			}else{
				$("#loan_money").hide();
			}
		});
	});
    // 接待切换switch逻辑代码开始
    $(function () {
        var $container = $(".receiving-container"),is_allowgw_closenewdata,is_closed;
        function loadData(){
            $.ajax({
                url:'/manage/kefu_clients/ajaxdata',
                type:'POST',
                cache:false,
                dataType:'json',
                success:function(d){
                    if(~~d.code==1){
                        is_allowgw_closenewdata = d.data.is_allowgw_closenewdata;
                        is_closed = d.data.is_closed;
                        
                        if(is_allowgw_closenewdata==1){
                            if(is_closed==0){
                                $container.addClass("receiving-active");
                            }
                            $container.show();
                        }
                    }
                },
                error:function(){
                   alert('加载页面部分数据失败，请重新刷新页面!');
                }
            });
        }
        $container.click(function () {
            if(typeof(is_allowgw_closenewdata)=='undefined'){
                return;
            }
            $.ajax({
                url:'/manage/kefu_clients/closenewdata',
                type:'POST',
                data:{'is_closed': is_closed ? 0 : 1},
                cache:false,
                dataType:'json',
                success:function(d){
                    if(~~d.code==1){
                        is_closed = d.data.is_closed;
                        if(is_closed==0){
                            $container.addClass("receiving-active");
                        } else {
                            $container.removeClass("receiving-active");
                        }
                    }else{
                        alert(d.msg);
                    }
                },
                error:function(){
                   alert('加载页面部分数据失败，请重新刷新页面!');
                }
            });
            
        });
        loadData();
    });
	// 接待切换switch逻辑代码结束
</script>
