<!-- 自动推送链接 -->
<script>
$(function(){
   	$(".suspension-mod div.suspension3").hover(function(){
   		$("#suspension3").css('display','block');
   	},function(){
   		$("#suspension3").css('display','none');
   	});
	$(".suspension-mod div").click(function(){
		for(var i=1;i<5;i++){
			$("#suspension"+i).css('display','none');
		}
		var cla = $(this).attr('class');
		if(cla == 'suspension4'){
			document.documentElement.scrollTop = document.body.scrollTop =0;
		}else if(cla == 'suspension3'){
			$("#suspension3").css('display','none');
		}else{
			$("#"+cla).css('display','block');
		}
	});
	$(".close").click(function(){
		$(this).parent().parent().css('display','none')
	});
})
